name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

jobs:
  unit:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cutagent
          POSTGRES_USER: cutagent
          POSTGRES_PASSWORD: cutagent
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U cutagent -d cutagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      # The in-memory storage backend was removed: the whole suite now runs
      # against a real Postgres database. Object artifacts use the node-local
      # store (the default suite needs no MinIO; the Temporal tests in the
      # integration job use a shared MinIO).
      CUTAGENT_DATABASE_URL: postgresql+psycopg://cutagent:cutagent@localhost:55432/cutagent
      CUTAGENT_STORAGE_BACKEND: sqlalchemy
      CUTAGENT_OBJECTSTORE_BACKEND: local
      CUTAGENT_LOCAL_OBJECTSTORE_PATH: /tmp/cutagent-objstore
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ensure ffmpeg and ffprobe
        uses: ./.github/actions/setup-ffmpeg-tools
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies for pytest probes
        working-directory: apps/web
        run: npm ci
      - name: Bootstrap database
        # The suite assumes a migrated + seeded database: tests/conftest.py only
        # truncates and reseeds between tests, it does not run migrations.
        run: python scripts/bootstrap_database.py
      - name: Run default pytest suite
        run: timeout -k 5 1200 python -m pytest -q
      - name: Verify OpenAPI export is committed
        run: |
          python scripts/export_openapi.py
          git diff --exit-code apps/web/src/api/openapi.json

  production-preflight:
    # Issue #70: assert the fail-closed startup preflight (#66) rejects unsafe
    # production config and accepts a minimal safe one. Self-skips until the
    # preflight script ships, then activates. Shares scripts/ci_preflight_gate.sh
    # with the local gate (scripts/ci_gate.sh) so the two never drift.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Production startup preflight gate
        run: bash scripts/ci_preflight_gate.sh

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cutagent
          POSTGRES_USER: cutagent
          POSTGRES_PASSWORD: cutagent
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U cutagent -d cutagent"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      temporal:
        image: temporalio/auto-setup:1.26
        env:
          DB: postgres12
          DB_PORT: 5432
          POSTGRES_USER: cutagent
          POSTGRES_PWD: cutagent
          POSTGRES_SEEDS: postgres
        ports:
          - 7233:7233
    env:
      CUTAGENT_DATABASE_URL: postgresql+psycopg://cutagent:cutagent@localhost:55432/cutagent
      CUTAGENT_STORAGE_BACKEND: sqlalchemy
      CUTAGENT_TEMPORAL_ADDRESS: localhost:7233
      CUTAGENT_TEMPORAL_NAMESPACE: default
      CUTAGENT_TEMPORAL_TASK_QUEUE: cutagent-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Ensure ffmpeg and ffprobe
        uses: ./.github/actions/setup-ffmpeg-tools
      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"
      - name: Start MinIO (S3-compatible object store)
        # The Temporal step sets CUTAGENT_WORKFLOW_RUNTIME=temporal. The ephemeral
        # ObjectStore fail-fast (packages/core/storage/object_store_env.py) refuses
        # to start under Temporal when the ephemeral tier resolves to the
        # node-local "local" backend, because artifacts written by one worker are
        # invisible to activities on another worker. The store builder runs at
        # import time (packages/core/storage/object_store.py:
        # _OBJECT_STORE = object_store_from_env()), so MinIO must be up *before*
        # pytest collects tests that import the app. We run minio/minio here (not
        # as a `services:` container) because the image requires the `server /data`
        # subcommand, which a GitHub Actions service block cannot append after the
        # image name. Credentials and path-style addressing mirror the local demo
        # (docker-compose.yml + .env.example): minioadmin/minioadmin.
        run: |
          docker run -d --name minio \
            -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:RELEASE.2025-09-07T16-13-09Z \
            server /data --console-address ":9001"
          # Wait for the S3 API on :9000 to answer before continuing. MinIO's
          # /minio/health/live endpoint returns 200 once the server is ready.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1; then
              echo "MinIO is ready"; break
            fi
            echo "Waiting for MinIO... ($i)"; sleep 2
            if [ "$i" -eq 30 ]; then echo "MinIO did not become ready" >&2; docker logs minio || true; exit 1; fi
          done
      - name: Create MinIO buckets (durable + ephemeral)
        # The S3ObjectStore auto-creates its bucket on first connect via
        # _ensure_bucket(), but we pre-create both buckets explicitly so the
        # configuration is correct by construction and visible in the logs. The
        # durable and ephemeral tiers must use distinct bucket names (the tiered
        # store routes by the bucket embedded in each object URI). We reuse boto3,
        # already installed by the dev extra, so bucket creation uses the same
        # client config the app uses (path-style, SigV4).
        run: |
          python - <<'PY'
          import boto3
          from botocore.config import Config

          client = boto3.client(
              "s3",
              endpoint_url="http://127.0.0.1:9000",
              aws_access_key_id="minioadmin",
              aws_secret_access_key="minioadmin",
              region_name="us-east-1",
              config=Config(signature_version="s3v4", s3={"addressing_style": "path"}),
          )
          for bucket in ("cutagent-local", "cutagent-ephemeral"):
              try:
                  client.create_bucket(Bucket=bucket)
                  print(f"created bucket {bucket}")
              except client.exceptions.BucketAlreadyOwnedByYou:
                  print(f"bucket {bucket} already exists")
          PY
      - name: Bootstrap database
        # Seed demo media source artifacts into the SAME object store the Temporal
        # worker reads from (MinIO/S3), so the rehydrated demo assets carry a
        # readable source artifact. Without this the durable tier resolves to the
        # node-local backend and the worker can't read the seeded portrait/broll.
        env:
          CUTAGENT_OBJECTSTORE_BACKEND: s3
          CUTAGENT_OBJECTSTORE_ENDPOINT: http://127.0.0.1:9000
          CUTAGENT_OBJECTSTORE_BUCKET: cutagent-local
          CUTAGENT_OBJECTSTORE_ACCESS_KEY: minioadmin
          CUTAGENT_OBJECTSTORE_SECRET_KEY: minioadmin
          CUTAGENT_OBJECTSTORE_ADDRESSING_STYLE: path
          CUTAGENT_EPHEMERAL_OBJECTSTORE_BACKEND: s3
          CUTAGENT_EPHEMERAL_OBJECTSTORE_ENDPOINT: http://127.0.0.1:9000
          CUTAGENT_EPHEMERAL_OBJECTSTORE_BUCKET: cutagent-ephemeral
          CUTAGENT_EPHEMERAL_OBJECTSTORE_ACCESS_KEY: minioadmin
          CUTAGENT_EPHEMERAL_OBJECTSTORE_SECRET_KEY: minioadmin
          CUTAGENT_EPHEMERAL_OBJECTSTORE_ADDRESSING_STYLE: path
        run: python scripts/bootstrap_database.py
      - name: Run database integration tests
        run: timeout -k 5 600 python -m pytest -q tests/integration
      - name: Run Temporal integration tests
        # Mirror the local demo: a MinIO-backed durable tier AND a MinIO-backed
        # ephemeral tier (distinct buckets). The ephemeral S3 config is what
        # satisfies the fail-fast guard under CUTAGENT_WORKFLOW_RUNTIME=temporal.
        # MinIO is S3-compatible and uses path-style addressing.
        env:
          CUTAGENT_RUN_TEMPORAL_TESTS: "1"
          CUTAGENT_WORKFLOW_RUNTIME: temporal
          # Durable tier on shared MinIO (mirrors docker-compose / .env.example).
          CUTAGENT_OBJECTSTORE_BACKEND: s3
          CUTAGENT_OBJECTSTORE_ENDPOINT: http://127.0.0.1:9000
          CUTAGENT_OBJECTSTORE_BUCKET: cutagent-local
          CUTAGENT_OBJECTSTORE_ACCESS_KEY: minioadmin
          CUTAGENT_OBJECTSTORE_SECRET_KEY: minioadmin
          CUTAGENT_OBJECTSTORE_ADDRESSING_STYLE: path
          # Ephemeral tier on shared MinIO (distinct bucket). Required so the
          # ephemeral fail-fast guard passes under Temporal.
          CUTAGENT_EPHEMERAL_OBJECTSTORE_BACKEND: s3
          CUTAGENT_EPHEMERAL_OBJECTSTORE_ENDPOINT: http://127.0.0.1:9000
          CUTAGENT_EPHEMERAL_OBJECTSTORE_BUCKET: cutagent-ephemeral
          CUTAGENT_EPHEMERAL_OBJECTSTORE_ACCESS_KEY: minioadmin
          CUTAGENT_EPHEMERAL_OBJECTSTORE_SECRET_KEY: minioadmin
          CUTAGENT_EPHEMERAL_OBJECTSTORE_ADDRESSING_STYLE: path
        run: timeout -k 5 600 python -m pytest -q tests/temporal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci
      - name: Verify generated API types
        working-directory: apps/web
        run: |
          npm run generate:api
          git diff --exit-code src/api/schema.d.ts
      - name: Build frontend
        working-directory: apps/web
        run: npm run build
