services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: cutagent
      POSTGRES_USER: cutagent
      POSTGRES_PASSWORD: cutagent
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cutagent -d cutagent"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  temporal:
    image: temporalio/auto-setup:1.26
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: cutagent
      POSTGRES_PWD: cutagent
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./deploy/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - "7233:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -lc "pip install --no-cache-dir -e . && python -m apps.worker"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      CUTAGENT_STORAGE_BACKEND: sqlalchemy
      CUTAGENT_DATABASE_URL: postgresql+psycopg://cutagent:cutagent@postgres:5432/cutagent
      CUTAGENT_WORKFLOW_RUNTIME: temporal
      CUTAGENT_TEMPORAL_ADDRESS: temporal:7233
      CUTAGENT_TEMPORAL_NAMESPACE: default
      CUTAGENT_TEMPORAL_TASK_QUEUE: cutagent-production
    volumes:
      - .:/app

volumes:
  postgres-data:
  minio-data:
