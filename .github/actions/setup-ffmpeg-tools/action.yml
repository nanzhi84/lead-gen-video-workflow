name: Setup ffmpeg tools
description: Ensure ffmpeg and ffprobe are available on PATH.
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        if command -v ffmpeg >/dev/null 2>&1 && command -v ffprobe >/dev/null 2>&1 \
          && ffmpeg -hide_banner -filters 2>/dev/null | grep -q vidstabtransform; then
          ffmpeg -version | head -n 1
          ffprobe -version | head -n 1
          exit 0
        fi

        echo "Compatible ffmpeg/ffprobe not found; installing static fallback binaries"
        python -m pip install --disable-pip-version-check imageio-ffmpeg==0.6.0 ffmpeg-binaries==1.1.0
        python - <<'PY'
        import pathlib
        import shutil

        import imageio_ffmpeg
        from ffmpeg.executable import get_executable_path

        ffprobe = get_executable_path()[1]
        if ffprobe is None:
            raise RuntimeError("ffmpeg-binaries did not provide ffprobe")

        target_dir = pathlib.Path.home() / ".local" / "bin"
        target_dir.mkdir(parents=True, exist_ok=True)
        for source, name in [(imageio_ffmpeg.get_ffmpeg_exe(), "ffmpeg"), (ffprobe, "ffprobe")]:
            target = target_dir / name
            shutil.copy2(source, target)
            target.chmod(0o755)
            print(target)
        PY
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        "$HOME/.local/bin/ffmpeg" -version | head -n 1
        "$HOME/.local/bin/ffmpeg" -hide_banner -filters | grep -q vidstabtransform
        "$HOME/.local/bin/ffprobe" -version | head -n 1
